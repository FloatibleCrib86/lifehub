workflows:
  android-debug-apk:
    name: LifeSim Debug APK
    instance_type: linux_x2
    max_build_duration: 30
    environment:
      node: 22.16.0
      java: 21
      vars:
        APP_VERSION: 1.0.0
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        - $CM_BUILD_DIR/node_modules
    scripts:
      - name: Install JavaScript dependencies
        script: npm ci
      - name: Sync web files into Android
        script: npm run sync
      - name: Build installable debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

  android-release:
    name: LifeSim Release APK and AAB
    instance_type: linux_x2
    max_build_duration: 30
    environment:
      node: 22.16.0
      java: 21
      android_signing:
        - lifesim_keystore
      vars:
        APP_VERSION: 1.0.0
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        - $CM_BUILD_DIR/node_modules
    scripts:
      - name: Install JavaScript dependencies
        script: npm ci
      - name: Sync web files into Android
        script: npm run sync
      - name: Build signed release APK and Play Store AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
